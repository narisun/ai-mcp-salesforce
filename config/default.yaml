environment: dev
service_name: salesforce-mcp
agent_role: data_analyst_agent
transport: sse
port: 8081

opa_url: http://opa:8181/v1/data/mcp/tools/allow
opa_timeout_seconds: 2.0

max_result_bytes: 15000
enable_tool_cache: true
tool_cache_ttl_seconds: 300

redis_host: redis
redis_port: 6379
redis_password: ${REDIS_PASSWORD}

# PostgreSQL database — salesforce-mcp queries a salesforce.* schema
# replica in the shared pgvector container, not the live Salesforce API.
db_host: pgvector
db_port: 5432
db_name: ai_memory
db_user: admin
db_pass: ${DB_PASS}

registry_url: http://ai-registry:8090
service_url: http://salesforce-mcp:8081
service_version: "0.6.0"
internal_api_key: ${INTERNAL_API_KEY}
